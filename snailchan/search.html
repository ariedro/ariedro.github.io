    if (!$("#mario").hasClass("moving"))
      $("#mario").addClass("moving");

    $("#mario").animate({

        $("#mario").removeClass("moving").offset({ left: -100 });
      }
    });
  }

  function randomIntFromInterval(min,max){
    return Math.floor(Math.random()*(max-min+1)+min);
  }
